<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>SEC Trading Strategy Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-4xl font-bold mb-2 text-center text-blue-400">📊 Insider Strategy Lab</h1>
    <p class="text-center text-gray-400 mb-10 text-sm">Startkapitaal per strategie: €10.000 | Inleg per trade: €1.000</p>
    
    <div id="dashboard" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('insider_data/fictional_portfolios.json');
                const data = await response.json();
                const container = document.getElementById('dashboard');
                
                for (const [strat, info] of Object.entries(data)) {
                    const profitColor = info.total_profit >= 0 ? 'text-green-400' : 'text-red-400';
                    const totalValue = (info.balance + info.positions.reduce((acc, p) => acc + p.amount + (p.pnl_usd || 0), 0)).toLocaleString();

                    let positionsHtml = info.positions.map(p => `
                        <div class="bg-gray-700 p-3 rounded mb-2 border-l-4 ${p.pnl_percent >= 0 ? 'border-green-500' : 'border-red-500'}">
                            <div class="flex justify-between font-bold text-lg">
                                <span>${p.ticker}</span>
                                <span class="${p.pnl_percent >= 0 ? 'text-green-400' : 'text-red-400'}">
                                    ${p.pnl_percent >= 0 ? '▲' : '▼'} ${p.pnl_percent}%
                                </span>
                            </div>
                            <div class="text-xs text-gray-400 flex justify-between">
                                <span>Inleg: $${p.amount}</span>
                                <span>P/L: $${p.pnl_usd || 0}</span>
                            </div>
                        </div>
                    `).join('');

                    container.innerHTML += `
                        <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700">
                            <h2 class="text-2xl font-bold mb-1 text-blue-300">${strat.replace('_', ' ')}</h2>
                            <div class="mb-6">
                                <span class="text-sm text-gray-500 font-semibold uppercase">Totaal Waarde</span>
                                <div class="text-3xl font-mono">€${totalValue}</div>
                                <div class="text-sm ${profitColor} font-bold">Winst: €${info.total_profit}</div>
                            </div>
                            <h3 class="text-xs font-semibold text-gray-500 uppercase mb-3 tracking-widest">Actieve Posities</h3>
                            <div class="space-y-2">${positionsHtml || '<p class="text-gray-600 italic">Wachten op signalen...</p>'}</div>
                        </div>
                    `;
                }
            } catch (e) {
                document.getElementById('dashboard').innerHTML = '<p class="text-center col-span-3">Nog geen data beschikbaar. Run de scraper handmatig via Actions.</p>';
            }
        }
        loadData();
    </script>
</body>
</html>
