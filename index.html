<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>SEC Trading Strategy Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <h1 class="text-4xl font-bold mb-2 text-center text-blue-400">📊 Insider Strategy Lab</h1>
    <p class="text-center text-gray-400 mb-8 text-sm">Kapitaal: €10.000 per strategie | Live SEC Monitoring</p>
    
    <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
        <div id="portfolios" class="xl:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>

        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 h-fit">
            <h2 class="text-xl font-bold mb-4 text-orange-400 flex items-center">
                <span class="relative flex h-3 w-3 mr-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-orange-500"></span>
                </span>
                SEC Live Radar
            </h2>
            <div id="live-feed" class="space-y-3 max-h-[600px] overflow-y-auto pr-2 text-sm text-gray-300">
                Laden...
            </div>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                // 1. Laad Portefeuilles
                const pResp = await fetch('insider_data/fictional_portfolios.json');
                const pData = await pResp.json();
                const pContainer = document.getElementById('portfolios');
                
                pContainer.innerHTML = '';
                for (const [strat, info] of Object.entries(pData)) {
                    const profitColor = info.total_profit >= 0 ? 'text-green-400' : 'text-red-400';
                    const totalValue = (info.balance + info.positions.reduce((acc, p) => acc + p.amount + (p.pnl_usd || 0), 0)).toLocaleString();

                    let posHtml = info.positions.map(p => `
                        <div class="bg-gray-700 p-2 rounded text-xs border-l-2 ${p.pnl_percent >= 0 ? 'border-green-500' : 'border-red-500'} mb-1">
                            <div class="flex justify-between font-bold"><span>${p.ticker}</span><span class="${p.pnl_percent >= 0 ? 'text-green-400' : 'text-red-400'}">${p.pnl_percent}%</span></div>
                        </div>
                    `).join('');

                    pContainer.innerHTML += `
                        <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg">
                            <h3 class="font-bold text-blue-300 mb-2 border-b border-gray-700 pb-2">${strat.replace('_', ' ')}</h3>
                            <div class="text-2xl font-mono mb-1">€${totalValue}</div>
                            <div class="${profitColor} text-xs font-bold mb-4">Winst: €${info.total_profit}</div>
                            <div class="space-y-1">${posHtml || '<p class="text-gray-600 italic text-xs">Geen actieve trades</p>'}</div>
                        </div>`;
                }

                // 2. Laad Live Feed
                const fResp = await fetch('insider_data/live_feed.json');
                const fData = await fResp.json();
                const fContainer = document.getElementById('live-feed');
                
                fContainer.innerHTML = fData.map(f => `
                    <div class="bg-gray-900 p-3 rounded border border-gray-700 hover:border-blue-500 transition-colors">
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-blue-400">${f.ticker}</span>
                            <span class="text-[10px] bg-gray-700 px-1 rounded">${f.type}</span>
                        </div>
                        <div class="text-[11px] mt-1 text-gray-400">${f.role}</div>
                        <div class="flex justify-between items-center mt-2">
                            <span class="font-mono text-xs text-white">$${f.value.toLocaleString()}</span>
                            <span class="${f.value > 50000 ? 'text-green-400' : 'text-gray-600'} text-[10px]">
                                ${f.value > 50000 ? '⭐ KANDIDAAT' : 'Onder grens'}
                            </span>
                        </div>
                    </div>
                `).join('');

            } catch (e) {
                console.log("Nog geen data beschikbaar...");
            }
        }
        loadDashboard();
        setInterval(loadDashboard, 60000); // Ververs elke minuut
    </script>
</body>
</html>
