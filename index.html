<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>SEC Trading Strategy Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-3xl font-bold mb-6 text-center">📊 Insider Strategy Performance</h1>
    <div id="dashboard" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        </div>

    <script>
        async function loadData() {
            const response = await fetch('insider_data/fictional_portfolios.json');
            const data = await response.json();
            const container = document.getElementById('dashboard');
            
            for (const [strat, info] of Object.entries(data)) {
                let positionsHtml = info.positions.map(p => `
                    <div class="border-b py-2 text-sm">
                        <span class="font-bold">${p.ticker}</span> - $${p.amount}<br>
                        <span class="text-gray-500 text-xs">${p.reason}</span>
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="bg-white p-6 rounded-lg shadow-lg">
                        <h2 class="text-xl font-bold border-b-2 border-blue-500 pb-2 mb-4">${strat.replace('_', ' ')}</h2>
                        <p class="text-2xl font-mono text-green-600 mb-4">$${info.balance.toLocaleString()}</p>
                        <h3 class="font-semibold mb-2">Open Posities:</h3>
                        ${positionsHtml || '<p class="text-gray-400">Nog geen trades...</p>'}
                    </div>
                `;
            }
        }
        loadData();
    </script>
</body>
</html>
