name: SEC Insider Scraper & Trading Simulator

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper and Update Portfolios
        run: python insider_scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Zorg dat beide JSON bestanden worden opgeslagen
          git add insider_data/latest.json
          git add insider_data/fictional_portfolios.json
          git commit -m "Update insider data & portfolios: $(date)" || echo "No changes to commit"
          git push
