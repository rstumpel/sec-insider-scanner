name: SEC Insider Scraper & Trading Simulator

on:
  schedule:
    # Draait nu elke 30 minuten (*/30) in plaats van elke 6 uur (*/6)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Behoud de handmatige startknop

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cruciaal om de JSON-data terug te schrijven naar je repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests yfinance

      - name: Run Scraper and Update Portfolios
        run: python insider_scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # We voegen nu ALLE bestanden in de map insider_data toe
          # Dit dekt: latest.json, portfolios.json, live_feed.json EN rejected_filings.json
          git add insider_data/*.json
          
          # [skip ci] voorkomt dat de bot zichzelf in een oneindige loop triggert
          git commit -m "Update SEC data & Audit Trail: $(date) [skip ci]" || echo "Geen wijzigingen"
          git push
