name: SEC Insider Scraper & Trading Simulator

on:
  schedule:
    # Draait elke 6 uur om de markten en nieuwe meldingen te volgen
    - cron: '0 */6 * * *'
  workflow_dispatch: # Hiermee kun je de knop "Run workflow" handmatig gebruiken

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cruciaal om de JSON-portefeuilles op te slaan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests yfinance

      - name: Run Scraper and Update Portfolios
        run: python insider_scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Voeg alle relevante bestanden toe aan de commit
          git add insider_data/latest.json
          git add insider_data/fictional_portfolios.json
          git commit -m "Update data & live market prices: $(date)" || echo "Geen wijzigingen om te committen"
          git push
