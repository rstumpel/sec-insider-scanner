name: SEC Insider Scraper

on:
  schedule:
    - cron: '0 */6 * * *' # Elke 6 uur
  workflow_dispatch:      # Handmatige knop

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        run: python insider_scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add insider_data/*.json
          git commit -m "Update insider data: $(date)" || echo "No changes to commit"
          git push
